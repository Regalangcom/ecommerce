#     require-explanation: false
#     require-specific: false

  revive:
    min-confidence: 0
    rules:
      - name: exported


  # staticcheck:
  #   go: "1.18"
  #   checks: ["all"]

  # stylecheck:
  #   go: "1.18"
  #   checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]

  # unparam:
  #   check-exported: false

  # unused:
  #   go: "1.18"

linters:
  enable:
    - bodyclose
    - deadcode
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exportloopref
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gomnd
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - structcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - varcheck
    - whitespace

  # disable:
  #   - asciicheck
  #   - funlen
  #   - gochecknoglobals
  #   - gocognit
  #   - godot
  #   - godox
  #   - goerr113
  #   - maligned
  #   - nestif
  #   - prealloc
  #   - testpackage
  #   - wsl

