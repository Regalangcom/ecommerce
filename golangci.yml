run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  modules-download-mode:readonly
#   build-tags: []
#   skip-dirs:
#     - vendor
#     - .git
#     - node_modules
#   skip-files:
#     - ".*\\.pb\\.go$"
