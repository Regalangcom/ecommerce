#   print-linter-name: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
#     disabled-checks:
#       - dupImport # https://github.com/go-critic/go-critic/issues/845
#       - ifElseChain
#       - octalLiteral
#       - whyNoLint
#       - wrapperFunc

#   gocyclo:
